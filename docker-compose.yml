services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - proshop-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/proshop_v2
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo
    networks:
      - proshop-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  mongo_data:
  uploads_data:

networks:
  proshop-net:
    driver: bridge
